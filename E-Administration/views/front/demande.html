<script>
    // Script pour afficher dynamiquement le prix et le délai selon le choix
    const selectType = document.getElementById('selectType');
    const infoBox = document.getElementById('infoBox');
    const displayPrix = document.getElementById('displayPrix');
    const displayDelai = document.getElementById('displayDelai');

    selectType.addEventListener('change', function() {
        const option = this.options[this.selectedIndex];
        const prix = option.getAttribute('data-prix');
        const delai = option.getAttribute('data-delai');

        if(this.value) {
            displayPrix.textContent = parseFloat(prix).toFixed(3);
            displayDelai.textContent = delai;
            infoBox.style.display = 'block';
        } else {
            infoBox.style.display = 'none';
        }
    });
</script>
