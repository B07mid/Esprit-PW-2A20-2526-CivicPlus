<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Civic Plus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --fondation: #162866;
      --confiance: #243B8F;
      --confort: #A9B5D1;
      --action: #F08A4B;
      --clarte: #E7DFD8;
      --bg-light: #F4F6FB;
      --text-dark: #1E2A4A;
      --white: #ffffff;
    }

    * {
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--bg-light), #eef2fb);
      color: var(--text-dark);
      margin: 0;
    }

    .sidebar {
      min-height: 100vh;
      background: linear-gradient(180deg, var(--fondation), var(--confiance));
      color: var(--white);
      padding: 28px 20px;
      box-shadow: 4px 0 18px rgba(22, 40, 102, 0.08);
    }

    .sidebar h3 {
      font-weight: 700;
      margin-bottom: 30px;
      color: var(--white);
    }

    .sidebar a {
      display: block;
      color: rgba(255,255,255,0.92);
      text-decoration: none;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      transition: 0.3s;
      font-weight: 500;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: rgba(255,255,255,0.14);
      color: var(--white);
    }

    .content {
      padding: 32px;
    }

    .page-title {
      font-weight: 700;
      color: var(--fondation);
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--white);
      border: none;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 12px 28px rgba(22, 40, 102, 0.08);
      height: 100%;
    }

    .stat-card h5 {
      color: var(--fondation);
      font-weight: 600;
      margin-bottom: 12px;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 700;
      color: var(--action);
      margin: 0;
    }

    .section-card {
      margin-top: 30px;
      background: var(--white);
      border: none;
      border-radius: 22px;
      box-shadow: 0 12px 28px rgba(22, 40, 102, 0.08);
      padding: 24px;
    }

    .section-title {
      color: var(--fondation);
      font-weight: 700;
      margin-bottom: 18px;
    }

    .table {
      margin-bottom: 0;
    }

    .table thead th {
      background: #eef2fb;
      color: var(--fondation);
      border: none;
      font-weight: 600;
      padding: 14px;
    }

    .table tbody td {
      padding: 14px;
      vertical-align: middle;
      border-color: #edf1f7;
    }

    .btn-block {
      background: var(--action);
      border: none;
      color: var(--white);
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: 600;
    }

    .btn-block:hover {
      background: #e57b39;
      color: var(--white);
    }

    .badge-soft {
      display: inline-block;
      background: rgba(240, 138, 75, 0.12);
      color: var(--action);
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    @media (max-width: 768px) {
      .sidebar {
        min-height: auto;
      }

      .content {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <div class="col-md-3 col-lg-2 sidebar">
      <h3>Civic Admin</h3>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="#">Utilisateurs</a>
      <a href="historique-chatbot.html">Historique Chatbot</a>
    </div>

    <div class="col-md-9 col-lg-10 content">
      <div class="badge-soft">Administration</div>
      <h2 class="page-title">Tableau de bord</h2>

      <div class="row g-4">
        <div class="col-md-4">
          <div class="stat-card">
            <h5>Utilisateurs</h5>
            <p class="stat-number">25</p>
          </div>
        </div>

        <div class="col-md-4">
          <div class="stat-card">
            <h5>Messages Chatbot</h5>
            <p class="stat-number">120</p>
          </div>
        </div>

        <div class="col-md-4">
          <div class="stat-card">
            <h5>Signalements</h5>
            <p class="stat-number">10</p>
          </div>
        </div>
      </div>

      <div class="section-card">
        <h3 class="section-title">Gestion des utilisateurs</h3>

        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>CIN</th>
                <th>Nom</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>12345678</td>
                <td>Ali</td>
                <td><button class="btn btn-block btn-sm">Bloquer</button></td>
              </tr>
              <tr>
                <td>87654321</td>
                <td>Sara</td>
                <td><button class="btn btn-block btn-sm">Bloquer</button></td>
              </tr>
              <tr>
                <td>11223344</td>
                <td>Youssef</td>
                <td><button class="btn btn-block btn-sm">Bloquer</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
