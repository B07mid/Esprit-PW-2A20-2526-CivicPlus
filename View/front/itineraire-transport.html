<!DOCTYPE html>
<html>
<head>
    <title>Itinéraire Transport</title>
</head>
<body>

<h1>Rechercher un itinéraire</h1>

<form action="#">
    
    <label>Point de départ:</label><br>
    <input type="text" name="depart"><br><br>

    <label>Destination:</label><br>
    <input type="text" name="destination"><br><br>

    <label>Moyen de transport:</label><br>
    <select name="transport">
        <option>Bus</option>
        <option>Métro</option>
        <option>Tramway</option>
    </select><br><br>

    <button type="submit">Calculer</button>

</form>

<h2>Résultat</h2>
<p>Trajet estimé: 25 minutes</p>
<p>Heure d’arrivée estimée: 14:30</p>
<p>État du trafic: Fluide</p>
<a href="signaler-transport.html">Signaler un problème</a>

</body>
</html>
