<!DOCTYPE html>
<html lang="fr" class="light-style layout-menu-fixed" dir="ltr" data-theme="theme-default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gardes signalées - CivicPlus BackOffice</title>
  <link rel="icon" type="image/x-icon" href="../../../assets/img/RawShape.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <link href="../../../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../../../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../../../assets/css/main.css?v=20260502-3" rel="stylesheet">
  <link href="../../../assets/css/admin.css?v=20260511-dashboard-chat3" rel="stylesheet">
</head>
<body class="index-page">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar-container"></aside>
    <main class="admin-content">
      <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h2 class="mb-1">Gardes signalées</h2>
            <p class="text-muted mb-0">Lieux déclarés de garde par les citoyens.</p>
          </div>
          <button class="btn btn-primary" id="refreshGardes"><i class="bi bi-arrow-clockwise me-1"></i> Actualiser</button>
        </div>

        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Lieu</th>
                <th>Place ID</th>
                <th>CIN</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="gardesTableBody">
              <tr><td colspan="5" class="text-center">Chargement...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../../../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/js/auth.js?v=20260511-authfix"></script>
  <script src="../../../assets/js/load_admin_sidebar.js?v=20260511-dashboard-chat3"></script>
  <script>
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      }[char]));
    }

    function loadGardes() {
      const tbody = document.getElementById('gardesTableBody');
      tbody.innerHTML = '<tr><td colspan="5" class="text-center">Chargement...</td></tr>';
      fetch('../Controller/api_garde.php?action=getAll')
        .then(response => response.json())
        .then(payload => {
          const rows = payload.success ? payload.data : [];
          if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center">Aucune garde signalée.</td></tr>';
            return;
          }
          tbody.innerHTML = rows.map(row => `
            <tr>
              <td>${escapeHtml(row.id)}</td>
              <td><strong>${escapeHtml(row.nom_lieu)}</strong></td>
              <td><code>${escapeHtml(row.place_id)}</code></td>
              <td>${escapeHtml(row.num_cin || '-')}</td>
              <td>${escapeHtml(row.created_at || '-')}</td>
            </tr>
          `).join('');
        })
        .catch(() => {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Erreur de chargement.</td></tr>';
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('refreshGardes').addEventListener('click', loadGardes);
      loadGardes();
    });
  </script>
</body>
</html>
