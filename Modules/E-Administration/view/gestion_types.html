    <meta charset="UTF-8">

    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />

    <link href="../../../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../../../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />
    <link href="../../../assets/vendor/aos/aos.css" rel="stylesheet" />
    <link href="../../../assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet" />
    <link href="../../../assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet" />

</head>
<body class="index-page">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar-container"></aside>

    <main class="admin-content">
      <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="mb-1">Types de Documents</h2>
            <p class="text-muted mb-0">Gestion des types de documents E-Administration</p>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card border-0 shadow-sm rounded-4" style="background-color: #f8f9fa;">
              <div class="card-body p-4">
                <h5 class="fw-bold mb-4" style="color: var(--heading-color);">Ajouter un type</h5>
                <form id="formAjoutType">
                  <div class="mb-3">
                    <label for="libelle" class="form-label fw-bold text-secondary">Libellé du document <span class="text-danger">*</span></label>
                    <input type="text" class="form-control rounded-3" id="libelle" name="libelle" placeholder="Ex: Extrait de naissance" required style="border-color: #e0e0e0;">
                  </div>
                  <div class="mb-4">
                    <label for="duree_validite_mois" class="form-label fw-bold text-secondary">Durée (Mois)</label>
                    <input type="number" class="form-control rounded-3" id="duree_validite_mois" name="duree_validite_mois" placeholder="Ex: 3" style="border-color: #e0e0e0;">
                    <div class="form-text">Laissez vide si le document n'expire pas.</div>
                  </div>
                  <div class="d-grid">
                    <button type="submit" class="btn rounded-pill fw-bold" style="background-color: var(--accent-color); color: var(--contrast-color);">Créer le type</button>
                  </div>
                </form>
              </div>
            </div>
          </div>

          <div class="col-lg-8">
            <div class="table-responsive rounded-4 shadow-sm border-0 overflow-hidden">
              <table class="table table-hover mb-0 admin-table align-middle border-0">
                <thead class="admin-table-head">
                  <tr>
                    <th class="border-0">ID</th>
                    <th class="border-0">Libellé</th>
                    <th class="border-0">Validité (Mois)</th>
                    <th class="text-end border-0">Actions</th>
                  </tr>
                </thead>
                <tbody id="typesTableBody">
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/vendor/aos/aos.js"></script>
  <script src="../../../assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="../../../assets/vendor/swiper/swiper-bundle.min.js"></script>
  <script src="../../../assets/js/main.js"></script>
  <script src="js/gestion_types.js"></script>
<script src='/Esprit-PW-2A20-2526-CivicPlus/assets/js/auth.js?v=5'></script>
  <script src="/Esprit-PW-2A20-2526-CivicPlus/assets/js/load_admin_sidebar.js?v=2"></script>
  </body>
</html>
