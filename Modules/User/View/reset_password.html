<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Mot de passe oublié | CivicPlus</title>
  <meta name="description" content="Réinitialiser votre mot de passe CivicPlus">

  <link href="../../../assets/img/RawShape.png" rel="icon">
  <link href="../../../assets/img/RawShape.png" rel="apple-touch-icon">

  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Raleway:wght@400;500;600;700;800&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link href="../../../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../../../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../../../assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="../../../assets/css/main.css" rel="stylesheet">
</head>

<body class="index-page">
  <div id="header-container" class="sticky-top" style="top: 0; z-index: 1030;"></div>

  <main id="main">
    <section class="section contact">
      <div class="container">
        <div class="row justify-content-center" data-aos="fade-up" data-aos-delay="100">
          <div class="col-12 col-xl-5 col-lg-7">
            <div class="card rounded-4 shadow-lg border-0 overflow-hidden" style="background-color: #f8f9fa;">
              <div class="card-body p-4 p-lg-5">
                <div id="resetIntro" class="mb-4 text-center">
                  <div class="mb-3">
                    <i class="bi bi-key fs-1" style="color: var(--accent-color);"></i>
                  </div>
                  <h2 class="h4 mb-1 fw-bold" style="color: var(--heading-color);">Mot de passe oublié</h2>
                  <p class="text-muted mb-0">Recevez un code par email pour choisir un nouveau mot de passe.</p>
                </div>

                <div id="resetMessage" class="alert d-none mb-3" role="alert"></div>

                <div id="resetSuccess" class="d-none text-center py-2">
                  <div class="mx-auto mb-3 d-flex align-items-center justify-content-center" style="width: 70px; height: 70px; border-radius: 18px; background: #198754;">
                    <i class="bi bi-check2 text-white fs-1"></i>
                  </div>
                  <h2 class="h5 fw-bold mb-2" style="color: #198754;">Mot de passe changé</h2>
                  <p class="text-muted mb-4">Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.</p>
                  <a href="login.html" class="btn btn-success rounded-pill px-4 fw-bold">Aller à la connexion</a>
                </div>

                <form id="requestCodeForm" action="../Controller/PasswordResetController.php" method="POST">
                  <input type="hidden" name="action" value="demander_code">
                  <div class="mb-4">
                    <label for="email_request" class="form-label fw-bold text-secondary">Adresse e-mail</label>
                    <input type="email" class="form-control rounded-3" id="email_request" name="email" required style="border-color: #e0e0e0;">
                  </div>

                  <div class="d-grid mt-4">
                    <button type="submit" class="btn rounded-pill px-4 py-2 fw-bold" style="background-color: var(--accent-color); color: var(--contrast-color);">
                      <i class="bi bi-envelope me-2"></i>Recevoir le code
                    </button>
                  </div>
                </form>

                <form id="changePasswordForm" class="d-none" action="../Controller/PasswordResetController.php" method="POST">
                  <input type="hidden" name="action" value="changer_mot_de_passe">

                  <div class="mb-3">
                    <label for="email_reset" class="form-label fw-bold text-secondary">Adresse e-mail</label>
                    <input type="email" class="form-control rounded-3" id="email_reset" name="email" required style="border-color: #e0e0e0;">
                  </div>

                  <div class="mb-3">
                    <label for="code_reinitialisation" class="form-label fw-bold text-secondary">Code reçu</label>
                    <input type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" class="form-control rounded-3 text-center fw-bold fs-4" id="code_reinitialisation" name="code_reinitialisation" placeholder="000000" required style="border-color: #e0e0e0; letter-spacing: 8px;">
                  </div>

                  <div class="mb-3">
                    <label for="nouveau_mot_de_passe" class="form-label fw-bold text-secondary">Nouveau mot de passe</label>
                    <input type="password" class="form-control rounded-3" id="nouveau_mot_de_passe" name="nouveau_mot_de_passe" required minlength="6" style="border-color: #e0e0e0;">
                  </div>

                  <div class="mb-4">
                    <label for="confirmer_mot_de_passe" class="form-label fw-bold text-secondary">Confirmer le mot de passe</label>
                    <input type="password" class="form-control rounded-3" id="confirmer_mot_de_passe" name="confirmer_mot_de_passe" required minlength="6" style="border-color: #e0e0e0;">
                  </div>

                  <div class="d-grid mt-4">
                    <button type="submit" class="btn rounded-pill px-4 py-2 fw-bold" style="background-color: var(--accent-color); color: var(--contrast-color);">
                      <i class="bi bi-check-circle me-2"></i>Changer le mot de passe
                    </button>
                  </div>
                </form>

                <div id="backToLogin" class="text-center mt-4 fw-bold">
                  <a href="login.html" style="color: var(--accent-color); text-decoration: underline;">Retour à la connexion</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center">
    <i class="bi bi-arrow-up-short"></i>
  </a>

  <div id="preloader"></div>

  <script src="../../../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/vendor/aos/aos.js"></script>
  <script src="../../../assets/js/main.js"></script>
  <script src="/civicplus/assets/js/load_header.js"></script>
  <script src="/civicplus/assets/js/auth.js?v=5"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const params = new URLSearchParams(window.location.search);
      const message = document.getElementById('resetMessage');
      const requestForm = document.getElementById('requestCodeForm');
      const changeForm = document.getElementById('changePasswordForm');
      const successPanel = document.getElementById('resetSuccess');
      const intro = document.getElementById('resetIntro');
      const backToLogin = document.getElementById('backToLogin');
      const email = params.get('email') || '';

      function showMessage(type, text) {
        const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
        message.className = `alert ${alertClass} mb-3`;
        message.textContent = text;
        message.classList.remove('d-none');
      }

      function showChangeForm() {
        requestForm.classList.add('d-none');
        changeForm.classList.remove('d-none');
        document.getElementById('email_reset').value = email;
      }

      if (email) {
        document.getElementById('email_request').value = email;
      }

      if (params.get('success') === '1') {
        intro.classList.add('d-none');
        requestForm.classList.add('d-none');
        changeForm.classList.add('d-none');
        message.classList.add('d-none');
        backToLogin.classList.add('d-none');
        successPanel.classList.remove('d-none');
        return;
      }

      if (params.get('sent') === '1') {
        showChangeForm();
        showMessage('success', 'Code envoyé. Vérifiez votre boîte email puis entrez le code ici.');
      }

      const errors = {
        invalid: 'Demande invalide.',
        email_invalid: 'Adresse email invalide.',
        email_not_found: 'Aucun compte trouvé avec cet email.',
        email_send_failed: "Impossible d'envoyer le code. Vérifiez la configuration Brevo.",
        code_invalid: 'Code invalide. Vérifiez les 6 chiffres reçus par email.',
        expired: 'Code expiré. Demandez un nouveau code.',
        password_short: 'Le mot de passe doit contenir au moins 6 caractères.',
        password_mismatch: 'Les mots de passe ne correspondent pas.',
        failed: 'Réinitialisation impossible pour le moment.',
        reset_failed: 'Réinitialisation impossible pour le moment.',
        server: 'Erreur serveur. Réessayez plus tard.'
      };

      const error = params.get('error');
      if (error && errors[error]) {
        if (params.get('sent') === '1' || ['code_invalid', 'expired', 'password_short', 'password_mismatch', 'failed', 'reset_failed'].includes(error)) {
          showChangeForm();
        }
        showMessage('error', errors[error]);
      }

      document.getElementById('code_reinitialisation').addEventListener('input', function () {
        this.value = this.value.replace(/\D+/g, '').slice(0, 6);
      });
    });
  </script>
</body>

</html>
