<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liste des Problèmes de Transport | CivicPlus BackOffice</title>

  <link rel="icon" type="image/png" href="../../../../assets/img/RawShape.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link href="../../../../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../../../../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />
  <link href="../../../../assets/css/main.css" rel="stylesheet" />
  <link href="../../../../assets/css/admin.css" rel="stylesheet" />
</head>

<body class="index-page">
  <div class="admin-layout">

    <aside class="admin-sidebar" id="admin-sidebar-container"></aside>

    <main class="admin-content">
      <div class="admin-card">

        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
          <div>
            <h2 class="mb-1">Liste des Problèmes de Transport</h2>
            <p class="page-subtitle">Gestion des incidents et anomalies du module Smart Transport</p>
          </div>

          <div class="d-flex gap-2">
            <a href="../front/signaler-transport.html" class="btn btn-primary">
              <i class="bi bi-plus-circle me-1"></i> Ajouter un problème
            </a>
          </div>
        </div>

        <div class="transport-stats">
          <div class="transport-stat-card">
            <div class="transport-stat-icon bg-soft-primary">
              <i class="bi bi-list-task"></i>
            </div>
            <div class="transport-stat-content">
              <small>Total incidents</small>
              <h4 id="statTotal">0</h4>
            </div>
          </div>

          <div class="transport-stat-card">
            <div class="transport-stat-icon bg-soft-warning">
              <i class="bi bi-hourglass-split"></i>
            </div>
            <div class="transport-stat-content">
              <small>En attente</small>
              <h4 id="statPending">0</h4>
            </div>
          </div>

          <div class="transport-stat-card">
            <div class="transport-stat-icon bg-soft-danger">
              <i class="bi bi-exclamation-triangle"></i>
            </div>
            <div class="transport-stat-content">
              <small>Priorité élevée</small>
              <h4 id="statHigh">0</h4>
            </div>
          </div>

          <div class="transport-stat-card">
            <div class="transport-stat-icon bg-soft-success">
              <i class="bi bi-check2-circle"></i>
            </div>
            <div class="transport-stat-content">
              <small>Résolus</small>
              <h4 id="statResolved">0</h4>
            </div>
          </div>
        </div>

        <div class="toolbar-card">
          <div class="row g-3 align-items-center">
            <div class="col-lg-4 col-md-6">
              <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="searchId" class="form-control" placeholder="Rechercher par ID..." />
              </div>
            </div>

            <div class="col-lg-3 col-md-6">
              <select id="filterStatut" class="form-select filter-select">
                <option value="">Tous les statuts</option>
                <option value="0">En attente</option>
                <option value="2">En cours</option>
                <option value="1">Résolu</option>
              </select>
            </div>

            <div class="col-lg-3 col-md-6">
              <select id="filterPriorite" class="form-select filter-select">
                <option value="">Toutes les priorités</option>
                <option value="Faible">Faible</option>
                <option value="Haute">Haute</option>
              </select>
            </div>

            <div class="col-lg-2 col-md-6 text-md-end">
              <button id="btnFilter" class="btn btn-outline-secondary w-100">
                <i class="bi bi-funnel me-1"></i> Filtrer
              </button>
            </div>
          </div>
        </div>

        <div class="table-card">
          <div class="table-responsive">
            <table class="table table-striped table-hover admin-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Type</th>
                  <th>Type de problème</th>
                  <th>Localisation</th>
                  <th>Date et heure</th>
                  <th>Statut</th>
                  <th>Priorité</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="transportTableBody"></tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <div class="modal fade" id="editTransportModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="editTransportForm">
          <div class="modal-header">
            <h5 class="modal-title">Modifier le signalement</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="edit_id_signalement" />

            <div class="mb-3">
              <label for="edit_type_probleme" class="form-label">Type de problème</label>
              <input type="text" id="edit_type_probleme" class="form-control" required />
            </div>

            <div class="mb-3">
              <label for="edit_pris_en_compte_ia" class="form-label">Statut</label>
              <select id="edit_pris_en_compte_ia" class="form-select" required>
                <option value="0">En attente</option>
                <option value="2">En cours</option>
                <option value="1">Résolu</option>
              </select>
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Annuler</button>
            <button type="submit" class="btn btn-primary">Enregistrer</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../../../../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="list_transport.js"></script>
<script src='/Esprit-PW-2A20-2526-CivicPlus/assets/js/auth.js?v=5'></script>
  <script src="/Esprit-PW-2A20-2526-CivicPlus/assets/js/load_admin_sidebar.js?v=2"></script>
  </body>

</html>
