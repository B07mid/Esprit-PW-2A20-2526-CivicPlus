<!DOCTYPE html>
<html lang="fr" class="light-style layout-menu-fixed" dir="ltr"
      data-theme="theme-default" data-assets-path="../../../assets/">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Projets Crowdfunding – CivicPlus BackOffice</title>

  <link rel="icon" type="image/x-icon" href="../../../assets/img/RawShape.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet" />

  <link href="../../../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../../../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../../../assets/css/main.css" rel="stylesheet">
  <link href="../../../assets/css/admin.css" rel="stylesheet">
</head>

<body class="index-page">
  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="brand">
        <img src="../../../assets/img/RawShape.png" alt="CivicPlus Logo" class="brand-image" width="24" height="24">
        <div>
          <h1>CivicPlus</h1>
          <small>BackOffice</small>
        </div>
      </div>
      <ul class="menu-inner">
        <li class="menu-item">
          <a href="../../../admin.html" class="menu-link">
            <i class="bi bi-house-door-fill"></i>
            <div>
              <p class="menu-text mb-0">Tableau de Bord</p>
              <p class="menu-description mb-0">Vue d'ensemble</p>
            </div>
          </a>
        </li>
        <li class="menu-item">
            <a href="../../E-Administration/view/liste_demandes.html" class="menu-link">
            <i class="bi bi-building"></i>
            <span class="menu-text">E-Administration</span>
          </a>
        </li>
        <li class="menu-item">
            <a href="../../Transport/View/back/list_transport.html" class="menu-link">
            <i class="bi bi-bus-front"></i>
            <span class="menu-text">Smart Transport</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="../../Signalement/view/liste_signalements.html" class="menu-link">
            <i class="bi bi-flag-fill"></i>
            <span class="menu-text">Signalements Urbains</span>
          </a>
        </li>
        <li class="menu-item active">
          <a href="liste_projets.html" class="menu-link">
            <i class="bi bi-currency-dollar"></i>
            <span class="menu-text">Crowdfunding – Projets</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="liste_donations.html" class="menu-link">
            <i class="bi bi-piggy-bank"></i>
            <span class="menu-text">Crowdfunding – Donations</span>
          </a>
        </li>
        <li class="menu-item">
            <a href="../../Geo-Services/View/liste_poi.html" class="menu-link">
            <i class="bi bi-map-fill"></i>
            <span class="menu-text">Geo-Services</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="#" class="menu-link">
            <i class="bi bi-life-preserver"></i>
            <span class="menu-text">Support &amp; IA</span>
          </a>
        </li>
      </ul>
    </aside>

    <!-- Main content -->
    <main class="admin-content">
      <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <h2 class="mb-0">Projets Crowdfunding</h2>
          <a href="citoyen_nouveau_projet.html" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nouveau projet
          </a>
        </div>

        <div id="flashBox"></div>

        <!-- Project cards container -->
        <div class="row g-4" id="projetsContainer">
          <!-- Rempli dynamiquement par liste_projets.js -->
        </div>

        <div id="emptyMsg" class="alert alert-info d-none">Aucun projet trouvé.</div>
      </div>
    </main>
  </div>

  <!-- Edit modal -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Modifier le projet</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit_id_projet">
          <div class="mb-3">
            <label class="form-label fw-bold">Titre</label>
            <input type="text" class="form-control" id="edit_titre">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Description</label>
            <textarea class="form-control" id="edit_description" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Objectif ($)</label>
            <input type="number" class="form-control" id="edit_budget" step="any" min="1">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Ville</label>
            <input type="text" class="form-control" id="edit_ville">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Quartier</label>
            <input type="text" class="form-control" id="edit_quartier">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Statut</label>
            <select class="form-select" id="edit_statut">
              <option value="en_recherche_financement">Recherche de financement</option>
              <option value="financé">Financé</option>
              <option value="en_cours">En cours</option>
              <option value="terminé">Terminé</option>
              <option value="annulé">Annulé</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
          <button class="btn btn-primary" id="btnSave">Sauvegarder</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="js/liste_projets.js"></script>
</body>
</html>
