<!DOCTYPE html>
<html lang="fr" class="light-style layout-menu-fixed" dir="ltr"
      data-theme="theme-default" data-assets-path="../../../assets/">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Projets Crowdfunding – CivicPlus BackOffice</title>

  <link rel="icon" type="image/x-icon" href="../../../assets/img/RawShape.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet" />

  <link href="../../../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../../../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../../../assets/css/main.css" rel="stylesheet">
  <link href="../../../assets/css/admin.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body class="index-page">
  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="admin-sidebar" id="admin-sidebar-container"></aside>

    <!-- Main content -->
    <main class="admin-content">
      <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
          <h2 class="mb-0">Projets Crowdfunding</h2>
          <a href="citoyen_nouveau_projet.html?direct=1" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nouveau projet
          </a>
        </div>

        <div id="flashBox"></div>

        <!-- Projects table -->
        <div class="table-responsive" id="projetsWrapper">
          <table class="table table-hover align-middle" id="projetsContainer">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Titre</th>
                <th>Localisation</th>
                <th>Collecté</th>
                <th>Objectif</th>
                <th>Statut</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="projetsBody">
              <!-- Rempli dynamiquement par liste_projets.js -->
            </tbody>
          </table>
        </div>

        <div id="emptyMsg" class="alert alert-info d-none">Aucun projet trouvé.</div>

        <!-- Demandes button -->
        <div class="mt-4 pt-3 border-top">
          <button class="btn btn-warning position-relative" onclick="ouvrirDemandes()">
            <i class="bi bi-inbox-fill me-1"></i> Demandes de projets
            <span id="demandesCount" class="position-absolute top-0 start-100 translate-middle badge rounded-circle bg-danger d-none" style="font-size:0.7rem;min-width:1.4rem;">0</span>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Demandes modal -->
  <div class="modal fade" id="demandesModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-inbox-fill me-2 text-warning"></i>Demandes de projets en attente</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="demandesFlash"></div>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>#</th><th>CIN</th><th>Titre</th><th>Type</th><th>Budget</th><th>Localisation</th><th>Date</th><th class="text-center">Actions</th>
                </tr>
              </thead>
              <tbody id="demandesTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit modal -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Modifier le projet</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit_id_projet">
          <div class="mb-3">
            <label class="form-label fw-bold">Titre</label>
            <input type="text" class="form-control" id="edit_titre">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Description</label>
            <textarea class="form-control" id="edit_description" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Objectif ($)</label>
            <input type="number" class="form-control" id="edit_budget" step="any" min="1">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Ville</label>
            <input type="text" class="form-control" id="edit_ville">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Quartier</label>
            <input type="text" class="form-control" id="edit_quartier">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Statut</label>
            <select class="form-select" id="edit_statut">
              <option value="en_recherche_financement">Recherche de financement</option>
              <option value="financé">Financé</option>
              <option value="en_cours">En cours</option>
              <option value="terminé">Terminé</option>
              <option value="annulé">Annulé</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
          <button class="btn btn-primary" id="btnSave">Sauvegarder</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Map Modal -->
  <div class="modal fade" id="mapModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title mb-0" id="mapModalTitle"><i class="bi bi-geo-alt-fill me-2 text-primary"></i></h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-0">
          <div id="adminLeafletMap" style="height:420px;width:100%;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/liste_projets.js?v=6"></script>
  <script>
    var _adminMap = null;
    var _adminMarker = null;
    function openMapModal(lat, lng, label) {
      document.getElementById('mapModalTitle').innerHTML =
        '<i class="bi bi-geo-alt-fill me-2 text-primary"></i>' + label;
      var modal = new bootstrap.Modal(document.getElementById('mapModal'));
      modal.show();
      document.getElementById('mapModal').addEventListener('shown.bs.modal', function handler() {
        if (!_adminMap) {
          _adminMap = L.map('adminLeafletMap').setView([lat, lng], 14);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
          }).addTo(_adminMap);
          _adminMarker = L.marker([lat, lng]).addTo(_adminMap).bindPopup(label).openPopup();
        } else {
          _adminMap.setView([lat, lng], 14);
          _adminMarker.setLatLng([lat, lng]).setPopupContent(label).openPopup();
          _adminMap.invalidateSize();
        }
        this.removeEventListener('shown.bs.modal', handler);
      });
    }
  </script>
<script src='/Esprit-PW-2A20-2526-CivicPlus/assets/js/auth.js?v=5'></script>
  <script src="/Esprit-PW-2A20-2526-CivicPlus/assets/js/load_admin_sidebar.js?v=2"></script>
  </body>
</html>
