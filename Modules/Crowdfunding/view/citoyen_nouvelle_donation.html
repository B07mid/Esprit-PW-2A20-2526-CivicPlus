<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faire une Donation – CivicPlus</title>
  <link rel="icon" type="image/png" href="../../../assets/img/RawShape.png" />

  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900&family=Raleway:ital,wght@0,100;0,300;0,400;0,500;0,600;0,700;0,800;0,900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700&display=swap" rel="stylesheet" />

  <link href="../../../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../../../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />
  <link href="../../../assets/vendor/aos/aos.css" rel="stylesheet" />
  <link href="../../../assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet" />

  <link href="../../../assets/css/main.css?v=20260502-3" rel="stylesheet" />
</head>

<body class="index-page">

  <div id="header-container" class="sticky-top" style="top: 0; z-index: 1030;"></div>

  <main id="main">
    <section class="section contact">
      <div class="container">
        <div class="section-title">
          <span>Crowdfunding</span>
          <h2>Faire une donation</h2>
          <p>Soutenez un projet communautaire dans votre quartier en effectuant une donation sécurisée.</p>
        </div>

        <div class="row justify-content-center">
          <div class="col-12 col-xl-7">
            <div class="card rounded-4 shadow-lg border-0 overflow-hidden">
              <div class="card-body p-4 p-lg-5">
                <div class="mb-4">
                  <h2 class="h4 mb-1">Formulaire de Donation</h2>
                  <p class="text-muted mb-0">Renseignez les détails de votre donation ci-dessous.</p>
                </div>

                <div id="alertBox"></div>

                <form action="../controller/DonationController.php?citoyen=1" method="POST"
                      id="formDonation" class="php-email-form"
                      style="background-color:#f8f9fa; border-radius:10px; padding:1.5rem;">
                  <div class="row gy-3">

                    <div class="col-md-12">
                      <label class="form-label fw-bold">Numéro CIN <span class="text-danger">*</span></label>
                      <div id="cin_display" class="form-control"
                           style="background-color:#e9ecef; color:#6c757d; font-family:monospace; cursor:default;">Chargement...</div>
                      <input type="hidden" name="num_cin" id="num_cin">
                    </div>

                    <div class="col-md-12">
                      <label class="form-label fw-bold">Projet <span class="text-danger">*</span></label>
                      <div id="projet_display" class="form-control"
                           style="background-color:#e9ecef; color:#6c757d; cursor:default;">Chargement...</div>
                      <input type="hidden" name="id_projet" id="id_projet">
                    </div>

                    <div class="col-md-6">
                      <label for="montant" class="form-label fw-bold">Montant ($) <span class="text-danger">*</span></label>
                      <input type="number" class="form-control" name="montant" id="montant"
                             min="0.01" step="any" placeholder="Ex: 100.00" required
                             style="color:#112f8d; background-color:#ffffff; font-weight:500;">
                    </div>

                    <div class="col-md-6">
                      <label for="methode_paiement" class="form-label fw-bold">Méthode de paiement <span class="text-danger">*</span></label>
                      <select class="form-select" name="methode_paiement" id="methode_paiement" required
                              style="color:#112f8d; background-color:#ffffff; font-weight:500;">
                        <option value="" disabled selected>— Choisir une méthode —</option>
                        <option value="carte_bancaire">Carte bancaire</option>
                        <option value="virement">Virement bancaire</option>
                        <option value="mobile_money">Paiement mobile</option>
                        <option value="especes">Espèces</option>
                      </select>
                      <input type="hidden" name="statut_paiement" value="en_attente">
                    </div>

                    <div class="col-md-12">
                      <label class="form-label fw-bold">Référence de transaction</label>
                      <div id="reference_display" class="form-control"
                           style="background-color:#e9ecef; color:#6c757d; font-family:monospace; cursor:default;"></div>
                      <input type="hidden" name="reference_transaction" id="reference_transaction">
                    </div>

                  </div>

                  <div class="text-end mt-4">
                    <button type="button" class="btn btn-secondary rounded-pill px-4 me-2"
                            onclick="history.back()">Annuler</button>
                    <button type="submit" class="btn-getstarted rounded-pill px-4">Confirmer la donation</button>
                  </div>
                </form>

              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../../../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/vendor/aos/aos.js"></script>
  <script src="../../../assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="../../../assets/vendor/swiper/swiper-bundle.min.js"></script>
  <script src="../../../assets/js/main.js"></script>
  <script src="../../../assets/js/load_header.js?v=20260502-2"></script>
  <script src="../../../assets/js/form-validation.js?v=1"></script>
  <script src="js/citoyen_donation.js"></script>


  <div id="footer-container"></div>
  <script src="/civicplus/assets/js/load_footer.js?v=20260502-1"></script>
</body>
</html>
